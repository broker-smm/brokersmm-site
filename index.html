<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brokersmm | كشف الحقائق الرقمية والتوعية التقنية</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1544823206346151" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-top: 5px solid var(--primary-color);
            margin: 15px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .badge {
            background: #ef4444;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        p {
            line-height: 1.8;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #22c55e;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Brokersmm</div>
        <div class="badge">تحديث شامل للمنصة</div>
        <h1>ننتقل من "الوساطة" إلى "التوعية"</h1>
        <p>
            مرحباً بكم في Brokersmm.com بحلته الجديدة. نحن الآن في مرحلة إعادة هيكلة المحتوى لنصبح مرجعكم الأول في كشف زيف الخدمات الرقمية، التحقيق في منصات الربح الوهمية، وتأمين تواجدكم على الإنترنت.
        </p>
        
        <div class="status">
            <span class="dot"></span>
            جاري العمل على المقالات التوعوية الجديدة...
        </div>
    </div>

</body>
</html>
